<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>MindTap Extractor</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 360px;
      background: #0f0f13;
      color: #e8e8f0;
    }

    .header {
      padding: 16px 18px 12px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2a2a40;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 11px;
      color: #6b7280;
      margin-top: 3px;
    }

    .stats {
      padding: 8px 18px;
      background: #13131a;
      border-bottom: 1px solid #1e1e2e;
      font-size: 11px;
      color: #6b7280;
    }

    .stats span {
      color: #a78bfa;
      font-weight: 600;
    }

    .empty-state {
      padding: 40px 18px;
      text-align: center;
      color: #4b5563;
      font-size: 12px;
      line-height: 1.8;
    }

    .empty-state .icon {
      font-size: 30px;
      margin-bottom: 10px;
    }

    .text-area-wrap {
      padding: 12px 18px 8px;
    }

    textarea {
      width: 100%;
      height: 200px;
      background: #1a1a28;
      border: 1px solid #2a2a40;
      border-radius: 8px;
      color: #d1d5db;
      font-size: 11px;
      line-height: 1.6;
      padding: 10px;
      resize: none;
      font-family: inherit;
      outline: none;
    }

    textarea:focus {
      border-color: #7c3aed;
    }

    .actions {
      padding: 6px 18px 14px;
      display: flex;
      gap: 8px;
    }

    button {
      flex: 1;
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover {
      opacity: 0.8;
    }

    .btn-copy {
      background: #7c3aed;
      color: white;
    }

    .btn-clear {
      background: #1e1e2e;
      color: #9ca3af;
      border: 1px solid #2a2a40;
    }

    .status {
      padding: 4px 18px 10px;
      font-size: 11px;
      color: #10b981;
      min-height: 22px;
    }
  </style>
</head>

<body>
  <div class="header">
    <h1>📖 MindTap Extractor</h1>
    <p>Skim the ebook — text is collected automatically</p>
  </div>

  <div class="stats">
    Collected: <span id="charCount">0</span> chars · <span id="pageCount">0</span> pages
  </div>

  <div id="main"></div>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>

</html>
